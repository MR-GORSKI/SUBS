<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SUBS — Subscription Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Track every recurring charge. Visual gantt timeline of your subscriptions.">
  <!-- Cache-bust: bump ?v= on every deploy. Browsers see new URL → fresh fetch. -->
  <link rel="stylesheet" href="styles.css?v=5">
  <link rel="stylesheet" href="mobile.css?v=5">
  <link rel="stylesheet" href="auth.css?v=5">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Plain JS modules (executed in order before Babel scripts) -->
  <script src="supabase.js?v=5"></script>
  <script src="fx.js?v=5"></script>
  <script src="prefs.js?v=5"></script>
  <script src="i18n.js?v=5"></script>
  <script src="gcal.js?v=5"></script>

  <!-- Shared Babel modules -->
  <script type="text/babel" src="tweaks-panel.jsx?v=5"></script>
  <script type="text/babel" src="utils.jsx?v=5"></script>
  <script type="text/babel" src="modals.jsx?v=5"></script>
  <script type="text/babel" src="gantt.jsx?v=5"></script>
  <script type="text/babel" src="auth.jsx?v=5"></script>

  <!-- Both shells; picker chooses one based on viewport -->
  <script type="text/babel" src="app.jsx?v=5"></script>
  <script type="text/babel" src="mobile.jsx?v=5"></script>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;
    const prefsAPI = window.prefs; // aliased so it doesn't shadow local `prefs` state

    function Splash({ label = 'LOADING…' }) {
      return (
        <div style={{
          minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontFamily: 'JetBrains Mono, monospace', fontSize: 12, letterSpacing: '0.2em',
          color: 'var(--ink-3, #888)', background: 'var(--bg, #fafaf7)',
        }}>{label}</div>
      );
    }

    function ErrorBox({ message, onRetry }) {
      return (
        <div style={{
          minHeight: '100vh', display: 'flex', flexDirection: 'column', gap: 12,
          alignItems: 'center', justifyContent: 'center',
          fontFamily: 'JetBrains Mono, monospace', padding: 24, textAlign: 'center',
        }}>
          <div style={{fontSize: 11, letterSpacing: '0.2em', color: 'oklch(0.62 0.22 28)'}}>SOMETHING BROKE</div>
          <div style={{fontSize: 13, maxWidth: 480}}>{message}</div>
          {onRetry && <button className="btn btn--sm btn--primary" onClick={onRetry}>RETRY</button>}
        </div>
      );
    }

    // Auth state
    function useAuth() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        let mounted = true;
        sb.auth.getSession().then(({ data }) => {
          if (!mounted) return;
          setUser(userProfile(data.session?.user));
          setLoading(false);
        });
        const { data: listener } = sb.auth.onAuthStateChange((_event, session) => {
          if (!mounted) return;
          setUser(userProfile(session?.user));
        });
        return () => { mounted = false; listener.subscription.unsubscribe(); };
      }, []);

      return { user, loading };
    }

    // Auth screen — picks desktop or mobile based on viewport
    function AuthScreen({ isMobile }) {
      const [mode, setMode] = useState('signin'); // 'signin' | 'signup'
      const handle = async () => {
        try { await signInWithGoogle(); }
        catch (e) { alert('Sign-in failed: ' + e.message); }
      };

      if (isMobile) {
        return (
          <MobileAuth
            mode={mode}
            onSignIn={handle}
            onSignUp={handle}
            onBack={() => setMode('signin')}
          />
        );
      }
      return mode === 'signup'
        ? <AuthSignUp onSignUp={handle} onSignIn={() => setMode('signin')} />
        : <AuthSignIn onSignIn={handle} onSignUp={() => setMode('signup')} />;
    }

    // Data layer — owns subs state, talks to Supabase, syncs to Google Calendar.
    function DataLayer({ user, onSignOut, isMobile, prefs, setPref }) {
      const [subs, setSubs] = useState(null); // null while loading
      const [error, setError] = useState(null);
      const [fxRates, setFxRates] = useState(null);

      const today = useMemo(() => {
        const d = new Date();
        d.setHours(12, 0, 0, 0);
        return d;
      }, []);

      // Load FX rates whenever displayCurrency changes.
      useEffect(() => {
        let alive = true;
        fx.ensure(prefs.displayCurrency).then(payload => {
          if (alive) setFxRates(payload);
        }).catch(err => console.warn('FX load failed:', err));
        return () => { alive = false; };
      }, [prefs.displayCurrency]);

      const reload = useCallback(() => {
        setError(null);
        setSubs(null);
        subsRepo.list()
          .then(setSubs)
          .catch(err => { console.error(err); setError(err.message || String(err)); setSubs([]); });
      }, []);

      useEffect(() => { reload(); }, [user.id, reload]);

      // Realtime sync (cross-device)
      useEffect(() => {
        const channel = sb
          .channel('subs:' + user.id)
          .on('postgres_changes',
            { event: '*', schema: 'public', table: 'subscriptions', filter: `user_id=eq.${user.id}` },
            () => { reload(); })
          .subscribe();
        return () => { sb.removeChannel(channel); };
      }, [user.id, reload]);

      // ── Google Calendar sync ───────────────────────────
      // Best-effort: errors are logged but never block the local data path.
      // CALENDAR_SCOPE_MISSING means user signed in before we requested the
      // scope — they need to sign out + sign in again. We surface that once.
      const calendarHandlerRef = React.useRef({ scopeWarned: false });

      const handleCalendarError = useCallback((e) => {
        if (e.message === 'CALENDAR_SCOPE_MISSING' && !calendarHandlerRef.current.scopeWarned) {
          calendarHandlerRef.current.scopeWarned = true;
          alert('Google Calendar access not granted. Sign out and sign in again to enable calendar reminders.');
          return;
        }
        if (e.message === 'CALENDAR_AUTH_REQUIRED' && !calendarHandlerRef.current.scopeWarned) {
          calendarHandlerRef.current.scopeWarned = true;
          alert('Google session expired. Sign out and sign in again to refresh calendar access.');
          return;
        }
        console.warn('Calendar sync:', e);
      }, []);

      // Lazily resolve the SUBS calendar id, caching in prefs.
      const resolveCalendarId = useCallback(async () => {
        if (prefs.googleCalendarId) return prefs.googleCalendarId;
        const id = await gcal.ensureSubsCalendar();
        setPref('googleCalendarId', id);
        return id;
      }, [prefs.googleCalendarId, setPref]);

      const syncCreate = useCallback(async (sub) => {
        if (!prefs.googleCalendarEnabled) return;
        try {
          const calendarId = await resolveCalendarId();
          const eventId = await gcal.createEvent(calendarId, sub, prefs.warnDays);
          // Persist gcal ids back so future updates/deletes target this event.
          await subsRepo.update(sub.id, { gcal_event_id: eventId, gcal_calendar_id: calendarId });
        } catch (e) { handleCalendarError(e); }
      }, [prefs.googleCalendarEnabled, prefs.warnDays, resolveCalendarId, handleCalendarError]);

      const syncUpdate = useCallback(async (sub) => {
        if (!prefs.googleCalendarEnabled) return;
        try {
          if (sub.gcal_event_id && sub.gcal_calendar_id) {
            await gcal.updateEvent(sub.gcal_calendar_id, sub.gcal_event_id, sub, prefs.warnDays);
          } else {
            // No event yet — create on first edit after toggle ON.
            const calendarId = await resolveCalendarId();
            const eventId = await gcal.createEvent(calendarId, sub, prefs.warnDays);
            await subsRepo.update(sub.id, { gcal_event_id: eventId, gcal_calendar_id: calendarId });
          }
        } catch (e) { handleCalendarError(e); }
      }, [prefs.googleCalendarEnabled, prefs.warnDays, resolveCalendarId, handleCalendarError]);

      const syncDelete = useCallback(async (sub) => {
        if (!sub.gcal_event_id || !sub.gcal_calendar_id) return;
        try { await gcal.deleteEvent(sub.gcal_calendar_id, sub.gcal_event_id); }
        catch (e) { handleCalendarError(e); }
      }, [handleCalendarError]);

      const addSub = useCallback(async (data) => {
        try {
          const created = await subsRepo.create(data);
          setSubs(p => [created, ...(p || [])]);
          syncCreate(created); // fire-and-forget
        } catch (e) { console.error(e); alert('Add failed: ' + e.message); }
      }, [syncCreate]);

      const updateSub = useCallback(async (id, patch) => {
        const before = (subs || []).find(s => s.id === id);
        const next = before ? { ...before, ...patch } : null;
        setSubs(p => (p || []).map(s => s.id === id ? { ...s, ...patch } : s)); // optimistic
        try {
          await subsRepo.update(id, patch);
          if (next) syncUpdate(next); // fire-and-forget
        }
        catch (e) { console.error(e); alert('Update failed: ' + e.message); reload(); }
      }, [reload, subs, syncUpdate]);

      const deleteSub = useCallback(async (id) => {
        const before = subs || [];
        const target = before.find(s => s.id === id);
        setSubs(p => (p || []).filter(s => s.id !== id)); // optimistic
        try {
          await subsRepo.remove(id);
          if (target) syncDelete(target); // fire-and-forget
        }
        catch (e) { console.error(e); alert('Delete failed: ' + e.message); setSubs(before); }
      }, [subs, syncDelete]);

      // ── One-time bulk sync when user toggles Calendar ON ──
      // Creates events for any existing subs that don't have one yet.
      // Skips closed subs (no point creating reminders for already-cancelled ones).
      const bulkSyncRunningRef = React.useRef(false);
      useEffect(() => {
        if (!prefs.googleCalendarEnabled || !subs || subs.length === 0) return;
        if (bulkSyncRunningRef.current) return;

        const pending = subs.filter(s => !s.closed && !s.gcal_event_id);
        if (pending.length === 0) return;

        bulkSyncRunningRef.current = true;
        (async () => {
          try {
            const calendarId = await resolveCalendarId();
            for (const s of pending) {
              try {
                const eventId = await gcal.createEvent(calendarId, s, prefs.warnDays);
                await subsRepo.update(s.id, { gcal_event_id: eventId, gcal_calendar_id: calendarId });
              } catch (e) { handleCalendarError(e); break; }
            }
          } finally { bulkSyncRunningRef.current = false; }
        })();
      }, [prefs.googleCalendarEnabled, prefs.warnDays, subs, resolveCalendarId, handleCalendarError]);

      if (error && (!subs || subs.length === 0)) {
        return <ErrorBox message={"Couldn't load your subscriptions: " + error} onRetry={reload} />;
      }
      if (subs === null) return <Splash label="LOADING SUBSCRIPTIONS…" />;

      const Shell = isMobile ? MobileApp : App;
      return <Shell
        subs={subs}
        addSub={addSub}
        updateSub={updateSub}
        deleteSub={deleteSub}
        today={today}
        user={user}
        onSignOut={onSignOut}
        prefs={prefs}
        setPref={setPref}
        fxRates={fxRates}
      />;
    }

    // Root: auth gate + global prefs
    function Root() {
      const { user, loading } = useAuth();
      const [prefs, setPref] = prefsAPI.usePrefs();
      const [isMobile, setIsMobile] = useState(() => window.matchMedia('(max-width: 768px)').matches);

      useEffect(() => {
        const mq = window.matchMedia('(max-width: 768px)');
        const onChange = (e) => setIsMobile(e.matches);
        mq.addEventListener('change', onChange);
        return () => mq.removeEventListener('change', onChange);
      }, []);

      const handleSignOut = useCallback(async () => {
        try { await signOut(); } catch (e) { alert('Sign-out failed: ' + e.message); }
      }, []);

      if (loading) return <Splash label="STARTING UP…" />;
      if (!user) return <AuthScreen isMobile={isMobile} />;
      return <DataLayer user={user} onSignOut={handleSignOut} isMobile={isMobile} prefs={prefs} setPref={setPref} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
