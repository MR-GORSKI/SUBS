<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SUBS — Subscription Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Track every recurring charge. Visual gantt timeline of your subscriptions.">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="mobile.css">
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Shared modules -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="utils.jsx"></script>
  <script type="text/babel" src="modals.jsx"></script>
  <script type="text/babel" src="gantt.jsx"></script>
  <script type="text/babel" src="auth.jsx"></script>

  <!-- Both shells; picker chooses one based on viewport -->
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel" src="mobile.jsx"></script>

  <script type="text/babel">
    // Viewport-based shell picker.
    // Mobile (≤768px) → MobileApp wrapped in shell that owns subs state + persistence.
    // Desktop → App (manages its own state internally).
    function MobileShell() {
      const [subs, setSubs] = React.useState(() => loadSubs() ?? SAMPLE_SUBS);
      React.useEffect(() => {
        try { localStorage.setItem(SUBS_STORAGE_KEY, JSON.stringify(subs)); } catch {}
      }, [subs]);
      const today = React.useMemo(() => {
        const d = new Date();
        d.setHours(12, 0, 0, 0);
        return d;
      }, []);
      return <MobileApp subs={subs} setSubs={setSubs} today={today} />;
    }

    const isMobile = window.matchMedia('(max-width: 768px)').matches;
    const Shell = isMobile ? MobileShell : App;
    ReactDOM.createRoot(document.getElementById('root')).render(<Shell />);
  </script>
</body>
</html>
